
services:
  api:
    build: ./api
    ports:
      - "6644:6644"
    env_file:
      - ./api/.env
    container_name: hcgateway_api
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: hcgateway_postgres
    restart: unless-stopped
    ports:
      # Bind to loopback only. PG is reached over the docker network by
      # `api` and over `pdc-agent`'s host-namespace localhost — neither
      # needs a LAN-facing port. Exposing 5432 on 0.0.0.0 made `example`
      # password reachable from the host's LAN.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: hcgateway
      # Default kept as `example` so a vanilla `docker compose up` still
      # boots, but it is the developer's job to override via .env for any
      # deployment they care about. See .env.example.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example}
      POSTGRES_DB: hcgateway
    volumes:
      - ./pg/data:/var/lib/postgresql/data
      - ./pg/migrations:/docker-entrypoint-initdb.d:ro

  pdc-agent:
    image: grafana/pdc-agent:latest
    container_name: hcgateway_pdc
    restart: unless-stopped
    network_mode: host
    command:
      - -token
      - ${PDC_AGENT_TOKEN}
      - -cluster
      - ${PDC_CLUSTER:-prod-au-southeast-1}
      - -gcloud-hosted-grafana-id
      - ${PDC_GRAFANA_ID}
    depends_on:
      - postgres

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hcgateway_cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - api
