
services:
  api:
    build: ./api
    ports:
      - "6644:6644"
    env_file:
      - ./api/.env
    container_name: hcgateway_api
    restart: always
    volumes:
      - ./api/service-account.json:/app/service-account.json
    depends_on:
      - postgres

  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: hcgateway_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hcgateway
      POSTGRES_PASSWORD: example
      POSTGRES_DB: hcgateway
    volumes:
      - ./pg/data:/var/lib/postgresql/data
      - ./pg/migrations:/docker-entrypoint-initdb.d:ro

  pdc-agent:
    image: grafana/pdc-agent:latest
    container_name: hcgateway_pdc
    restart: always
    network_mode: host
    command:
      - -token
      - ${PDC_AGENT_TOKEN}
      - -cluster
      - prod-au-southeast-1
      - -gcloud-hosted-grafana-id
      - "887998"
    depends_on:
      - postgres

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hcgateway_cloudflared
    restart: always
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - api
